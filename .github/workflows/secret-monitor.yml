name: 🔍 Daily Secret Monitor

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          
      - name: Run Secret Monitor
        env:
          # Use the built-in Actions token (no PAT secret required).
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/osint/github_secret_monitor.py
          
      - name: Commit and push report
        run: |
          git config --local user.name "cwarre33"
          git config --local user.email "cwarre33@alumni.uncc.edu"
          
          # Create reports directory for storing historical data
          mkdir -p reports/history
          
          # Move dated reports to history
          if [ -f reports/$(date +%Y-%m-%d)-report.md ]; then
            cp reports/$(date +%Y-%m-%d)-report.md reports/history/
          fi
          
          # Update latest report
          git add reports/
          git commit -m "📊 Daily OSINT Report - $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push || echo "No changes to push"
