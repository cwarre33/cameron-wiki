name: Cursor CI Agent (autofix failures)

on:
  workflow_run:
    workflows:
      - "Wiki Maintenance"
      - "Code Quality and Formatting"
      - "🔍 Daily Secret Monitor"
    types: [completed]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Optional: override prompt sent to the agent"
        required: false
        type: string

jobs:
  dispatch:
    # Only auto-run when a watched workflow actually failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout (for runner only)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: .github/cursor/ci_agent/package.json

      - name: Build prompt from failed run
        id: prompt
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.payload.workflow_run.id;
            const workflowName = context.payload.workflow_run.name;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const headBranch = context.payload.workflow_run.head_branch;
            const headSha = context.payload.workflow_run.head_sha;
            const attempt = context.payload.workflow_run.run_attempt;

            const jobsResp = await github.request(
              "GET /repos/{owner}/{repo}/actions/runs/{run_id}/jobs",
              { owner, repo, run_id: runId, per_page: 100 }
            );

            const jobs = jobsResp.data.jobs ?? [];
            const failedJobs = jobs
              .filter(j => j.conclusion === "failure" || j.conclusion === "cancelled" || j.conclusion === "timed_out")
              .slice(0, 5)
              .map(j => {
                const failedSteps = (j.steps ?? [])
                  .filter(s => s.conclusion === "failure")
                  .slice(0, 5)
                  .map(s => `- ${s.name}`)
                  .join("\n");
                return `### ${j.name}\nConclusion: ${j.conclusion}\n${failedSteps ? `Failed steps:\n${failedSteps}\n` : ""}`;
              })
              .join("\n\n");

            const prompt = [
              "You are a CI/CD maintenance agent for this repo.",
              "",
              "Your job:",
              "- Identify the root cause of the failing GitHub Actions workflow run.",
              "- Make the smallest correct change that fixes it.",
              "- Run relevant checks in the repo if feasible.",
              "- Open a PR with a clear summary and a minimal test plan.",
              "",
              `Repo: https://github.com/${owner}/${repo}`,
              `Default branch: main`,
              `Failed run branch: ${headBranch}`,
              `Head SHA: ${headSha}`,
              `Run attempt: ${attempt}`,
              `Failing workflow: ${workflowName}`,
              `Run URL: ${runUrl}`,
              "",
              "Failure context (from Actions Jobs API):",
              failedJobs || "(No job details found via API.)",
              "",
              "Constraints:",
              "- Do not modify files under raw/ (immutable sources).",
              "- Keep changes minimal and targeted.",
            ].join("\n");

            core.setOutput("prompt", prompt);

      - name: Use manual prompt override (optional)
        id: prompt_manual
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.prompt != '' }}
        run: |
          echo "prompt<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ inputs.prompt }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Install CI agent runner dependencies
        working-directory: .github/cursor/ci_agent
        run: |
          npm install

      - name: Launch Cursor Cloud Agent (auto PR)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}
          STARTING_REF: main
          MODEL_ID: composer-2
          PROMPT: ${{ steps.prompt_manual.outputs.prompt || steps.prompt.outputs.prompt || inputs.prompt }}
          AUTO_CREATE_PR: "true"
        working-directory: .github/cursor/ci_agent
        run: |
          npx --yes tsx src/run.ts
