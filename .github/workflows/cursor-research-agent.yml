name: Cursor Research Agent (kanban-driven)

on:
  schedule:
    # Run every 4 hours (matches other maintenance cadence)
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      project_node_id:
        description: "Optional override: GitHub ProjectV2 node id (e.g. PVT_kw...)"
        required: false
        type: string
      ready_status:
        description: "Status value that means 'ready to research'"
        required: false
        default: "Ready"
        type: string
      max_items:
        description: "Max research items to include in a single run"
        required: false
        default: "5"
        type: string

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      projects: read

    steps:
      - name: Checkout (for runner only)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: .github/cursor/research_agent/package.json

      - name: Collect research items from GitHub Projects
        id: items
        uses: actions/github-script@v7
        env:
          PROJECT_NODE_ID: ${{ inputs.project_node_id || secrets.GH_PROJECT_NODE_ID }}
          READY_STATUS: ${{ inputs.ready_status }}
          MAX_ITEMS: ${{ inputs.max_items }}
        with:
          script: |
            const projectId = process.env.PROJECT_NODE_ID;
            if (!projectId) {
              core.warning("GH_PROJECT_NODE_ID not set; skipping research run.");
              core.setOutput("skip", "true");
              return;
            }

            const readyStatus = (process.env.READY_STATUS || "Ready").trim();
            const maxItems = Math.max(1, Math.min(10, parseInt(process.env.MAX_ITEMS || "5", 10)));

            const query = `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    title
                    items(first: 50) {
                      nodes {
                        id
                        content {
                          __typename
                          ... on Issue { title body url number }
                          ... on PullRequest { title body url number }
                          ... on DraftIssue { title body }
                        }
                        fieldValues(first: 50) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field { ... on ProjectV2SingleSelectField { name } }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const resp = await github.graphql(query, { projectId });
            const project = resp?.node;
            const projectTitle = project?.title || "Unknown Project";
            const nodes = project?.items?.nodes || [];

            function getSingleSelect(item, fieldName) {
              const values = item?.fieldValues?.nodes || [];
              for (const v of values) {
                if (v?.__typename !== "ProjectV2ItemFieldSingleSelectValue") continue;
                const fn = v?.field?.name;
                if (fn && fn.toLowerCase() === fieldName.toLowerCase()) return v?.name;
              }
              return undefined;
            }

            const picked = [];
            for (const item of nodes) {
              const status = getSingleSelect(item, "Status");
              if (!status || status.toLowerCase() !== readyStatus.toLowerCase()) continue;

              const c = item?.content;
              const title = c?.title || "(untitled)";
              const body = c?.body || "";
              const url = c?.url || "";

              picked.push({ id: item.id, status, title, body: body.slice(0, 2000), url });
              if (picked.length >= maxItems) break;
            }

            if (picked.length === 0) {
              core.info(`No items with Status='${readyStatus}' found in project '${projectTitle}'.`);
              core.setOutput("skip", "true");
              return;
            }

            const payload = { projectTitle, readyStatus, items: picked };
            core.setOutput("skip", "false");
            core.setOutput("items_json", JSON.stringify(payload));

      - name: Install research runner dependencies
        if: ${{ steps.items.outputs.skip != 'true' }}
        working-directory: .github/cursor/research_agent
        run: npm install

      - name: Launch research agent (push to main)
        if: ${{ steps.items.outputs.skip != 'true' }}
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}
          STARTING_REF: main
          MODEL_ID: composer-2
          WORK_ON_CURRENT_BRANCH: "true"
          AUTO_CREATE_PR: "false"
          RESEARCH_ITEMS_JSON: ${{ steps.items.outputs.items_json }}
        working-directory: .github/cursor/research_agent
        run: |
          npx --yes tsx src/run.ts

