name: Wiki Maintenance

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'raw/**'
      - '.github/scripts/**'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  maintain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install graphifyy networkx graspologic

      - name: Set up graphify python path
        run: |
          mkdir -p graphify-out
          echo "$(which python)" > graphify-out/.graphify_python

      - name: Run wiki maintenance script
        run: python .github/scripts/maintain.py

      - name: Commit and push if changes exist
        run: |
          git config user.name "cwarre33"
          git config user.email "cwarre33@alumni.uncc.edu"
          git add wiki/overview.md wiki/log.md wiki/index.md graphify-out/ .graph/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(wiki): automated maintenance run [skip ci]"
            # Retry push with rebase-on-conflict to handle races with concurrent
            # workflow runs that may have pushed to main since checkout.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded on attempt ${attempt}."
                exit 0
              fi
              echo "Push attempt ${attempt} failed; rebasing on origin/main and retrying..."
              git pull --rebase --autostash origin main
              sleep $((attempt * 2))
            done
            echo "Push failed after multiple retries." >&2
            exit 1
          fi

